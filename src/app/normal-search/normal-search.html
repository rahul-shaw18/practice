<input type="text" [formControl]="search" >

<select [formControl]="role">
  <option value="">Select Role</option>
  <option value="admin">Admin</option>
  <option value="moderator">Moderator</option>
  <option value="user">User</option>
</select>
{{role.value}}

<table>
  <thead>
    <tr>
      <th>id</th>
      <th>firstName</th>
      <th>lastName</th>
      <th>email</th>
      <th>username</th>
      <th>role</th>
    </tr>
  </thead>
  <tbody>
    @for(user of users() | filter: search.value | filterByRole: role.value; track user.id){<tr>
      <td>{{user.id}}</td>
      <td>{{user.firstName}}</td>
      <td>{{user.lastName}}</td>
      <td>{{user.email}}</td>
      <td>{{user.username}}</td>
      <td>{{user.role}}</td>
    </tr>}
  </tbody>
</table>
